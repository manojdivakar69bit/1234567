name: Generate QR Code with Logo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: List all files
        run: |
          ls -la
          ls -la assets/ || echo "assets folder not found"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install myqr
        run: pip install myqr

      - name: Generate QR with logo
        run: |
          python -c "
from MyQR import myqr
try:
    myqr.run(
        words='https://github.com/manojdivakar69/1234567',
        picture='logo.png',
        colorized=True,
        save_name='final_qr.png',
        level='H'
    )
    print('Success!')
except Exception as e:
    print('Error:', e)
    exit(1)
"
      - name: Commit and push QR code
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-generate QR code with logo"
          file_pattern: 'final_qr.png'
