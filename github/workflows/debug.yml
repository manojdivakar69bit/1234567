name: Debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: List all files
        run: |
          echo "=== Root directory ==="
          ls -la
          echo ""
          echo "=== Check logo.png ==="
          if [ -f "logo.png" ]; then
            echo "✅ logo.png found!"
            file logo.png
          else
            echo "❌ logo.png NOT found!"
          fi
      - name: Test Python
        run: |
          python --version
          pip install segno pillow
          python -c "import segno; print('segno ok')"
