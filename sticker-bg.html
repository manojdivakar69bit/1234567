<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sticker BG</title>

<style>
body {
  margin: 0;
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* MAIN STICKER */
.sticker {
  width: 600px;
  height: 800px;
  border-radius: 40px;
  position: relative;
  overflow: hidden;
  background: radial-gradient(circle at 30% 20%, #0a1f44, #000814 80%);
  box-shadow:
    0 0 30px rgba(0,150,255,0.5),
    inset 0 0 60px rgba(0,150,255,0.3);
}

/* NEON BORDER */
.sticker::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 40px;
  padding: 3px;
  background: linear-gradient(120deg, #00d9ff, #0066ff, #00d9ff);
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}

/* TOP TEXT */
.title {
  position: absolute;
  top: 60px;
  width: 100%;
  text-align: center;
  font-size: 42px;
  font-weight: bold;
  color: #00d9ff;
  letter-spacing: 2px;
  text-shadow: 0 0 15px #00d9ff;
}

/* SUB TEXT */
.subtitle {
  position: absolute;
  top: 120px;
  width: 100%;
  text-align: center;
  font-size: 20px;
  color: #bfefff;
}

/* QR PLACEHOLDER */
.qr-box {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 320px;
  height: 320px;
  transform: translate(-50%, -50%);
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  box-shadow:
    0 0 25px rgba(0,150,255,0.4),
    inset 0 0 20px rgba(0,150,255,0.3);
}

/* BOTTOM TEXT */
.footer {
  position: absolute;
  bottom: 80px;
  width: 100%;
  text-align: center;
  font-size: 18px;
  color: #00d9ff;
  text-shadow: 0 0 10px #00d9ff;
}
</style>
</head>

<body>

<div class="sticker">

  <div class="title">SCAN IN EMERGENCY</div>

  <div class="subtitle">Instant Help • Call Family</div>

  <div class="qr-box"></div>

  <div class="footer">www.callmyfamily.in</div>

</div>

</body>
</html>
